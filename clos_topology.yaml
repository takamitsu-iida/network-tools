# CLOS (Spine-Leaf) トポロジ定義
# スパイン: 2台 / リーフ: 24台 / リンク: 48本 (各リーフが全スパインに接続)
#
# 構成イメージ:
#        Spine-1          Spine-2
#     │ │ │ ... │ │ │   │ │ │ ... │ │ │
#   Leaf-01 ~ Leaf-24 (各リーフが Spine-1/2 の両方に uplink)

nodes:
  # ─── スパインスイッチ ─────────────────────────────────────────────────
  - id: spine-1
    template: cisco/nxosv_switch
    label: "Spine-1"

  - id: spine-2
    template: cisco/nxosv_switch
    label: "Spine-2"

  # ─── リーフスイッチ ───────────────────────────────────────────────────
