vendor: aruba
os: aos-cx
device_type: switch
description: "Aruba AOS-CX Virtual Switch"
node_definition: aruba_aoscx
default_ram: 2048
default_cpus: 1
interfaces:
  - name: 1/1/1
    type: ethernet
    slot: 0
  - name: 1/1/2
    type: ethernet
    slot: 1
  - name: 1/1/3
    type: ethernet
    slot: 2
  - name: 1/1/4
    type: ethernet
    slot: 3
  - name: mgmt
    type: management
    slot: 4
config_parameters:
  - name: hostname
    type: string
    required: true
    description: "Device hostname"
  - name: banner
    type: string
    required: false
    description: "Login banner message"
  - name: ntp_server
    type: string
    required: false
    description: "NTP server address"
