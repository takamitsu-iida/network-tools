- GUIベースのネットワーク設計およびシミュレーションツール
  - 目的
    - 物理構成と論理構成の設計、およびその設計が実運用でどのように振る舞うかの事前検証。
  - 機能
    - 直感的なGUIによる機器配置、ケーブル接続、IPアドレス設計、VLAN/VRF設計など。
    - 複数メーカーの機器テンプレート（Cisco, Juniper, Aruba, Fortinetなど）を豊富に用意し、ドラッグ＆ドロップで配置可能。
    - 設計と同時に、Config自動生成のプレビュー機能。
    - 設計したネットワーク構成でのトラフィックシミュレーション機能（帯域使用率、遅延、パケットロスなどを予測）。特定のトラフィックパターンや障害シナリオを想定したシミュレーション。
    - セキュリティポリシーの設計と検証機能（ファイアウォールルール、アクセスリストなど）。
    - 冗長構成の設計と障害時の影響分析機能。
    - 設計バージョン管理機能と、過去バージョンとの差分表示機能。
    - 設計ガイドラインやベストプラクティスに基づいた自動提案・チェック機能。

  - 既存ツールと自作の組み合わせ
    - GUI部分やシミュレーションエンジンは既存のネットワークシミュレータ（Cisco Modeling Lab）をベースにカスタマイズ。Config自動生成や設計チェック部分は自作。

  - 実装戦略
    - アーキテクチャ
      - フロントエンド（Web GUI）とバックエンド（APIサーバー）を自作し、シミュレーションエンジンとしてCisco Modeling Labs（CML）をREST API経由で利用する。
      - 設計データはGitリポジトリで管理し、バージョン管理・差分表示を実現する。

    - 技術スタック
      - フロントエンド： React, TypeScript, React Flow（トポロジエディタ）, Monaco Editor（ConfigプレビューおよびDiff表示）, Chart.js / D3.js（シミュレーション結果可視化）
      - バックエンド： Python, FastAPI, Pydantic
      - CML連携： virl2-client（Cisco公式Python SDK）
      - Config自動生成： Jinja2テンプレート（メーカー・OSバージョン別に整理）
      - バージョン管理： Git + GitPython
      - データストア： PostgreSQL（設計メタデータ）+ YAMLファイル（トポロジ定義）
      - コンテナ化： Docker + Docker Compose

    - 実装ロードマップ
      - Phase1（基盤構築）
        - バックエンドFastAPI骨格の実装
        - CML REST APIへの接続およびトポロジCRUD
        - 機器テンプレートのYAMLスキーマ設計
      - Phase2（GUIコア）
        - React + React Flowによるトポロジエディタ
        - 機器パレットとドラッグ＆ドロップ配置
        - IPアドレス / VLAN / VRF 入力フォーム
      - Phase3（Config生成）
        - Jinja2テンプレートの整備（Cisco IOS/NX-OS, Junos等）
        - Monaco EditorによるConfigプレビュー
        - CMLへのトポロジプッシュとラボ起動
      - Phase4（シミュレーション）
        - トラフィックシミュレーション（iperf / CML内スクリプト活用）
        - 障害シナリオ注入API
        - 帯域・遅延・パケットロスのグラフ可視化
      - Phase5（高度機能）
        - セキュリティポリシー設計・検証
        - 冗長構成の障害影響分析
        - Gitベースのバージョン管理と差分表示
        - 設計チェックおよびベストプラクティス自動提案
